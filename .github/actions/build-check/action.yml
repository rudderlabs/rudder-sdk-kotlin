name: 'Build Check'
description: 'Build all publishable modules after quality checks pass'

inputs:
  android_modules:
    description: 'Comma-separated list of Android publishable modules'
    required: true
  jvm_modules:
    description: 'Comma-separated list of JVM publishable modules'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Gradle build cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.gradle/build-cache
          .gradle
        key: gradle-build-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
        restore-keys: |
          gradle-build-${{ runner.os }}-

    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew

    - name: Build all modules
      shell: bash
      run: |
        chmod +x scripts/run-gradle-tasks.sh
        ./scripts/run-gradle-tasks.sh \
          "${{ inputs.android_modules }}" "assembleRelease" \
          "${{ inputs.jvm_modules }}" "assemble"
