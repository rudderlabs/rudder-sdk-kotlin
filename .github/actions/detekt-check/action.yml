name: 'Detekt Check'
description: 'Run Detekt static analysis on all publishable modules'

inputs:
  available_modules:
    description: 'Comma-separated list of all publishable modules'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Gradle build cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.gradle/build-cache
          .gradle
        key: gradle-detekt-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
        restore-keys: |
          gradle-detekt-${{ runner.os }}-

    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew

    - name: Run Detekt on all modules
      shell: bash
      run: |
        chmod +x scripts/run-gradle-tasks.sh
        ./scripts/run-gradle-tasks.sh "${{ inputs.available_modules }}" "detekt"

    - name: Upload Detekt reports
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: detekt-reports-${{ github.run_id }}
        path: |
          **/build/reports/detekt/
