name: Android SDK Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0). If not provided, will auto-increment to next build version'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no publishing or PR creation)'
        type: boolean
        default: false
      skip_tests:
        description: 'Skip running tests (not recommended for production releases)'
        type: boolean
        default: false
  release:
    types: [created]
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.determine-version.outputs.version }}
      is_release_branch: ${{ steps.determine-version.outputs.is_release_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version and validate
        id: determine-version
        run: |
          chmod +x scripts/determine-version.sh
          ./scripts/determine-version.sh \
            "${{ github.event.inputs.version }}" \
            "${{ github.event_name }}" \
            "${{ github.event.release.tag_name }}"

  find-affected-modules:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      affected_modules: ${{ steps.find-modules.outputs.affected_modules }}
      has_affected_modules: ${{ steps.check-modules.outputs.has_affected_modules }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine base branch
        id: determine-base
        run: |
          chmod +x scripts/determine-release-base-branch.sh
          ./scripts/determine-release-base-branch.sh "${{ needs.validate.outputs.is_release_branch }}"

      - name: Find affected modules
        id: find-modules
        run: |
          chmod +x scripts/find-affected-modules.sh
          BASE_BRANCH="${{ steps.determine-base.outputs.base_branch }}"
          echo "Using base branch: $BASE_BRANCH"
          ./scripts/find-affected-modules.sh "$BASE_BRANCH"

      - name: Check if modules are affected
        id: check-modules
        run: |
          AFFECTED_MODULES="${{ steps.find-modules.outputs.affected_modules }}"
          if [ -n "$AFFECTED_MODULES" ]; then
            echo "has_affected_modules=true" >> $GITHUB_OUTPUT
            echo "Affected modules: $AFFECTED_MODULES"
          else
            echo "has_affected_modules=false" >> $GITHUB_OUTPUT
            echo "No modules affected"
          fi

  bump-version:
    needs: [validate, find-affected-modules]
    if: needs.find-affected-modules.outputs.has_affected_modules == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh \
            "${{ needs.validate.outputs.version }}" \
            "${{ needs.find-affected-modules.outputs.affected_modules }}" \
            "${{ github.event.inputs.dry_run }}"

  test:
    needs: [validate, find-affected-modules, bump-version]
    if: needs.find-affected-modules.outputs.has_affected_modules == 'true' && github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run quality checks in release mode
        run: |
          chmod +x scripts/run-quality-checks.sh scripts/run-release-tests.sh
          AFFECTED_MODULES="${{ needs.find-affected-modules.outputs.affected_modules }}"

          echo "Running quality checks on affected modules in release mode..."
          echo "Affected modules: $AFFECTED_MODULES"

          # Run detekt
          ./scripts/run-quality-checks.sh "$AFFECTED_MODULES" "detekt"

          # Run lint
          ./scripts/run-quality-checks.sh "$AFFECTED_MODULES" "lint"

          # Run tests in release mode
          ./scripts/run-release-tests.sh "$AFFECTED_MODULES"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-release-${{ github.run_id }}
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
            **/build/reports/lint-results*.html
          retention-days: 7

  build-and-stage:
    needs: [validate, find-affected-modules, bump-version, test]
    if: always() && needs.find-affected-modules.outputs.has_affected_modules == 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment: deployment
    outputs:
      built_modules: ${{ steps.build-aars.outputs.built_modules }}
      has_artifacts: ${{ steps.build-aars.outputs.has_artifacts }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Library Module AARs/JARs
        id: build-aars
        run: |
          chmod +x scripts/build-aars.sh
          AFFECTED_MODULES="${{ needs.find-affected-modules.outputs.affected_modules }}"

          echo "Building AAR/JAR files for affected library modules in release mode..."
          echo "Affected modules: $AFFECTED_MODULES"

          # Build AARs using existing script with release flag
          if [ -n "$AFFECTED_MODULES" ]; then
            # Set extra gradle arguments for release mode
            export GRADLE_EXTRA_ARGS="-Prelease"
            ./scripts/build-aars.sh "$AFFECTED_MODULES"
          else
            echo "No modules affected, skipping AAR build"
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy staging version to Maven Staging
        run: |
          chmod +x scripts/publish-to-maven.sh
          ./scripts/publish-to-maven.sh \
            "${{ needs.find-affected-modules.outputs.affected_modules }}" \
            "${{ github.event.inputs.dry_run }}"
        env:
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          SONATYPE_STAGING_PROFILE_ID: ${{ secrets.SONATYPE_STAGING_PROFILE_ID }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.NEXUS_PASSWORD }}
          SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.SIGNING_PRIVATE_KEY_BASE64 }}

      - name: Upload Library AARs/JARs
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-v${{ needs.validate.outputs.version }}
          path: |
            core/build/libs/*.jar
            android/build/outputs/aar/*-release.aar
            integrations/*/build/outputs/aar/*-release.aar
          retention-days: 30

  create-release:
    needs: [validate, find-affected-modules, build-and-stage]
    if: needs.build-and-stage.outputs.has_artifacts == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      release_url: ${{ steps.create-release.outputs.html_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-v${{ needs.validate.outputs.version }}
          path: ./artifacts

      - name: Create GitHub Release and Tag
        id: create-release
        run: |
          chmod +x scripts/create-release.sh
          ./scripts/create-release.sh \
            "${{ needs.validate.outputs.version }}" \
            "${{ needs.find-affected-modules.outputs.affected_modules }}" \
            "${{ needs.build-and-stage.outputs.built_modules }}" \
            "${{ github.event.inputs.dry_run }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  create-pull-requests:
    needs: [validate, create-release]
    if: needs.validate.outputs.is_release_branch == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release Pull Requests
        run: |
          chmod +x scripts/create-release-prs.sh
          ./scripts/create-release-prs.sh \
            "${{ needs.validate.outputs.version }}" \
            "${{ needs.find-affected-modules.outputs.affected_modules }}" \
            "${{ needs.create-release.outputs.html_url }}" \
            "${{ github.event.inputs.dry_run }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

  notify:
    needs: [validate, find-affected-modules, build-and-stage, create-release, create-pull-requests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send release notification
        if: always()
        run: |
          chmod +x scripts/send-release-notification.sh
          ./scripts/send-release-notification.sh \
            "${{ needs.validate.outputs.version }}" \
            "${{ needs.build-and-stage.result }}" \
            "${{ needs.create-release.result }}" \
            "${{ needs.find-affected-modules.outputs.affected_modules }}" \
            "${{ needs.build-and-stage.outputs.built_modules }}" \
            "${{ needs.create-release.outputs.html_url }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}


