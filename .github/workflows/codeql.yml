name: CodeQL Analysis

on:
  pull_request:

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all modules
        # :core:assemble - builds the JVM module (assembleDebug skips JVM modules)
        # assembleDebug  - builds all Android modules (android + integrations) in debug variant only
        # -x :app        - excludes the sample app from the build
        run: ./gradlew :core:assemble assembleDebug -x :app:assembleDebug --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
