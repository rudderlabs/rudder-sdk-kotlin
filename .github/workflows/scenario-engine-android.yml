name: Scenario Engine — Android (manual)

# Manual-trigger only. Boots an Android emulator and runs the scenario engine's
# L2 corpus (`:android-test-app:connectedDebugAndroidTest`). This is a demonstration
# of CI-runnability per §18 step 8 of the design doc — *not* a PR-gating workflow.
# Add it to PR validation only after the suite stabilizes on hosted runners.

on:
  workflow_dispatch:
    inputs:
      api-level:
        description: "Android API level for the emulator"
        required: false
        default: "34"
      target:
        description: "Emulator system image target (default | google_apis | google_apis_playstore)"
        required: false
        default: "default"
      gradle-args:
        description: "Extra args to pass to gradle"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scenario-engine-android:
    name: Scenario Engine Android (API ${{ inputs.api-level }})

    # ubuntu-latest, NOT self-hosted: GitHub's hosted Linux runners expose KVM, which
    # the Android emulator-runner action needs for x86_64 acceleration. Self-hosted
    # runners that lack nested virtualization will time out booting the emulator.
    # Switch to a self-hosted runner once one with KVM is provisioned.
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        # The emulator action assumes /dev/kvm is accessible. On hosted runners this
        # tweak is needed once per job; without it, the headless emulator boot fails
        # silently with `Cannot run program "qemu-system-x86_64-headless"`.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        # Caching the AVD shaves ~5 minutes off subsequent runs. The cache key includes
        # the api-level and target so config changes invalidate the cache cleanly.
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ inputs.api-level }}-${{ inputs.target }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          target: ${{ inputs.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD snapshot generated."

      - name: Run scenario engine connected tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          target: ${{ inputs.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # The scenario engine's tests live entirely in :android-test-app's androidTest
          # source set. Restrict to that module so the workflow doesn't pull every
          # SDK / integration module into the connected-test pipeline.
          script: ./gradlew :android-test-app:connectedDebugAndroidTest ${{ inputs.gradle-args }}

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-engine-test-reports-api${{ inputs.api-level }}
          path: |
            android-test-app/build/reports/androidTests/
            android-test-app/build/outputs/androidTest-results/
          retention-days: 7
          if-no-files-found: warn
